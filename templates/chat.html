<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Console — Financial XAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="chat-page">
    <div class="chatgpt-app">
        <aside class="chatgpt-sidebar" aria-label="Sidebar">
            <div class="chatgpt-sidebar-top">
                <button id="sidebar-new-chat" type="button" class="chatgpt-sidebar-new">New chat</button>
            </div>

            <div class="chatgpt-sidebar-section">
                <div class="chatgpt-sidebar-heading">Chats</div>
                <div id="history-list" class="chatgpt-history" aria-label="Chat history"></div>
            </div>

            <div class="chatgpt-sidebar-bottom">
                <div class="chatgpt-account" aria-label="Account">
                    <div class="chatgpt-account-avatar" aria-hidden="true">G</div>
                    <div class="chatgpt-account-meta">
                        <div class="chatgpt-account-name">Guest</div>
                        <div class="chatgpt-account-sub">Local history</div>
                    </div>
                </div>
                <div class="chatgpt-account-actions">
                    <a class="chatgpt-account-link" href="/" title="Back to home">Home</a>
                    <a class="chatgpt-account-link" href="/info" target="_blank" rel="noreferrer" title="API info">API</a>
                </div>
            </div>
        </aside>

        <button id="sidebar-overlay" class="chatgpt-overlay" type="button" aria-label="Close sidebar"></button>

        <div class="chatgpt-maincol">
            <header class="chatgpt-topbar">
                <button id="sidebar-toggle" type="button" class="chatgpt-iconbtn" aria-label="Toggle sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="4" y1="6" x2="20" y2="6"></line>
                        <line x1="4" y1="12" x2="20" y2="12"></line>
                        <line x1="4" y1="18" x2="20" y2="18"></line>
                    </svg>
                </button>
                <a class="chatgpt-brand" href="/">XAI.Finance</a>
                <div class="chatgpt-topbar-actions">
                    <button id="reset-btn" type="button" class="chatgpt-btn">New chat</button>
                </div>
            </header>

            <main class="chatgpt-main">
                <div class="chatgpt-wrap" aria-label="Chat console">
                    <div class="chatgpt-scroll" role="log" aria-live="polite">
                        <div id="messages" class="chatgpt-messages"></div>
                    </div>

                    <div class="chatgpt-composer-area">
                        <form id="chat-form" class="chatgpt-composer">
                            <label class="sr-only" for="message-input">Message</label>
                            <div class="chatgpt-composer-inner">
                                <textarea id="message-input" name="message" rows="1"
                                    placeholder="Message Financial XAI…" required autofocus></textarea>
                                <button class="chatgpt-send" type="submit" id="send-btn" title="Send">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                        <line x1="22" y1="2" x2="11" y2="13"></line>
                                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                    </svg>
                                </button>
                            </div>
                            <div class="chatgpt-footer">
                                Enter to send • Shift+Enter for a new line • Verify important info
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>

</html>
