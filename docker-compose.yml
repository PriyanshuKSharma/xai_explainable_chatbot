version: '3.8'

services:
  chatbot:
    build: .
    ports:
      - "8501:8501"
      - "5000:5000"
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - FINANCIAL_XAI_BACKEND_URL=http://localhost:5000/chat
      # Pass API keys if you have them in your .env
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    env_file:
      - .env
    volumes:
      - ./data:/app/data
